name: validate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate-skill:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate skill repository
        run: python scripts/validate_skill.py .

      - name: Compile helper scripts
        run: python -m py_compile scripts/pdf_guardrails.py scripts/validate_skill.py
